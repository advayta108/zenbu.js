<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Setting Up Zenbu</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="chrome"></div>

  <div class="container quiet" id="quiet">
    <img class="loading-gif" src="./loading.gif" alt="" draggable="false" />
    <div class="quiet-label" id="quietLabel">Completing install…</div>
  </div>

  <div class="container verbose" id="verbose" style="display:none">
    <div class="heading">Setup hit a snag</div>
    <div class="error-text" id="errorText"></div>

    <button class="disclosure" id="disclosure" type="button" aria-expanded="false">
      <span class="chevron">›</span>
      <span class="label" id="disclosureLabel">Show log</span>
    </button>

    <pre class="log" id="log" style="display:none"></pre>

    <div class="footer">
      <button class="secondary" id="copyBtn" type="button">Copy details</button>
      <button id="retryBtn" type="button">Retry</button>
    </div>
  </div>

  <script src="./setup.js"></script>
</body>
</html>
