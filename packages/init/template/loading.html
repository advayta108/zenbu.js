<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #F4F4F4;
    -webkit-app-region: drag;
    user-select: none;
    padding: 52px 48px 32px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  @media (prefers-color-scheme: dark) {
    body { background: #1a1a1a; }
    .skeleton { background: #2a2a2a; }
    .skeleton::after { background: linear-gradient(90deg, transparent, rgba(255,255,255,0.03), transparent); }
  }
  .skeleton {
    background: #e5e5e5;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
  }
  .skeleton::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
  .title { height: 28px; width: 35%; }
  .line { height: 14px; }
  .line:nth-child(2) { width: 90%; }
  .line:nth-child(3) { width: 70%; }
  .line:nth-child(4) { width: 80%; }
</style>
</head>
<body>
  <div class="skeleton title"></div>
  <div class="skeleton line"></div>
  <div class="skeleton line"></div>
  <div class="skeleton line"></div>
</body>
</html>
